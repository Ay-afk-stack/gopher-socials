name: Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v2

      - name: set up go
        uses: actions/setup-go@v2
        with:
          go-version: 1.26.2

      - name: verify dependencies
        run: go mod verify

      - name: build
        run: go build -v ./...

      - name: run go vet
        run: go vet ./...
